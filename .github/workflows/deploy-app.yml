name: Build and Deploy App
on:
  push:
    branches:
      - main
    paths:
      - 'terraform/scripts/app.py'
permissions:
  contents: write
jobs:
  build-and-deploy:
    name: Packer Build → Terraform Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Setup Packer
        uses: hashicorp/setup-packer@main

      - name: Packer Init
        run: cd packer && packer init app-ami.pkr.hcl

      - name: Build AMI
        run: cd packer && packer build app-ami.pkr.hcl

      - name: Extract AMI ID and update tfvars
        run: |
          NEW_AMI=$(jq -r '.builds[-1].artifact_id' packer/manifest.json | cut -d ":" -f2)
          echo "New AMI: $NEW_AMI"
          sed -i "s/app_ami_id = \".*\"/app_ami_id = \"$NEW_AMI\"/" terraform/terraform.tfvars
          grep app_ami_id terraform/terraform.tfvars

      - name: Commit updated AMI ID to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add terraform/terraform.tfvars
          git commit -m "chore: update app_ami_id to $(grep app_ami_id terraform/terraform.tfvars | cut -d'"' -f2) [skip ci]"
          git push

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: cd terraform && terraform init

      - name: Terraform Apply
        run: cd terraform && terraform apply -auto-approve
